<h1 style="color: #e90000;">LET US CATER YOUR EVENT!</h1>
<div class="features">
    <div>🔥 Fresh Cooked Daily</div>
    <div>🥩 Slow Roasted Meats</div>
    <div>🔥 Smoked Low and Slow</div>
    <div>🌱 Meat Raised Locally</div>
</div>
<form class="catering-form">
<div class="form-row">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your name">
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com">
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" placeholder="(123) 456-7890">
    </div>

    <div class="form-group">
        <label for="date">Event Date</label>
        <input type="date" id="date">
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label for="location">Event Location</label>
        <input type="address" id="address" placeholder="123 BBQ Lane, Concord, NC 28027">
    </div>

    <div class="form-group">
        <label for="guests">Approx. # of Guests</label>
        <input type="# of guests" id="Guests" placeholder="123">
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label for="instructions">Special Instructions</label>
        <input type="instructions" id="instructions" placeholder="(allergies, bring dinnerware, etc.)">
    </div>
</div>
	<button type="submit">Submit Request</button>
</form>

	<img src="cater-food.png" class="catering-banner" alt="Catering">
	
<footer>@2026 BBQ Restaurant. All rights reserved. Contact us at <a href="mailto:info@bbqrestaurant.com">info@bbqrestaurant.com</a></footer>
	</body>
