<h1>CONTACT US</h1>
<div class="contact-info">
    <p>If you have any questions or feedback, we'd love to hear from you.</p>

    <p><strong>Address:</strong> 123 BBQ Street, Concord, NC 28027</p>
    <p><strong>Phone:</strong> (123) 456-7890</p>
    <p><strong>Email:</strong> info@bbqrestaurant.com</p>
</div>
<form class="form-card">

    <div class="form-row">
        <div class="form-group">
            <label for="name">NAME</label>
            <input type="text" id="name" placeholder="Your name" required>
        </div>

        <div class="form-group">
            <label for="email">E-MAIL</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="phone">PHONE</label>
            <input type="tel" id="phone" placeholder="(123) 456-7890">
        </div>
    </div>

    <div class="form-group">
        <label for="message">MESSAGE</label>
        <textarea id="message" rows="6" placeholder="How can we help you?" required></textarea>
    </div>

    <button type="submit">SUBMIT</button>

</form>
<footer>
	@2026 BBQ Restaurant. All rights reserved. Contact us at <a href="mailto:info@bbqrestaurant.com">info@bbqrestaurant.com</a>
</footer>
